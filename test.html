<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nano Developer Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      min-height: 100vh;
    }

    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111827;
      border-bottom: 1px solid #1e293b;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #38bdf8;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }

    .hero {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      height: 80vh;
      padding: 20px;
    }

    .hero h1 {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .hero p {
      max-width: 600px;
      font-size: 18px;
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #1e293b;
      color: #94a3b8;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin-top: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">NanoDev</div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Projects</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Welcome to Nano.html</h1>

    <p>
      A lightweight modern developer template built using pure HTML, CSS, and JavaScript.
    </p>

    <button class="btn" onclick="showMessage()">
      Click Me
    </button>

    <div class="card" id="output">
      Waiting for interaction...
    </div>
  </section>

  <footer>
    © 2026 Nano Developer Template
  </footer>

  <script>
    function showMessage() {
      const output = document.getElementById("output");

      output.innerHTML = `
        <h3>Hello Developer 🚀</h3>
        <p>Your Nano.html app is running successfully.</p>
      `;
    }
  </script>

</body>
</html>
