apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-app
  template:
    metadata:
      labels:
        app: ecommerce-app
    spec:
      containers:
      - name: ecommerce-app
        image: ecommerce-app
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: ecommerce-storage
          mountPath: /app/data
      volumes:
      - name: ecommerce-storage
        persistentVolumeClaim:
          claimName: ecommerce-pvc