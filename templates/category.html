<!DOCTYPE html>
<html>

<head>

    <title>{{ category }}</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f1f3f6;
        }

        h1{
            text-align:center;
            color:#2874f0;
            font-size:38px;
            margin-top:20px;
        }

        .products{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:15px;
            padding:20px;
        }

        .card{
            background:white;
            padding:10px;
            border-radius:10px;
            text-align:center;
            box-shadow:0px 0px 5px lightgray;
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:8px;
        }

        .card h1{
            font-size:18px;
            margin:10px 0;
            color:black;
        }

        .card h2{
            font-size:16px;
            color:green;
            margin:5px 0;
        }

        .card p{
            font-size:14px;
        }

        .buttons{
            margin-top:10px;
        }

        .buttons a{
            text-decoration:none;
            padding:6px 10px;
            color:white;
            border-radius:5px;
            margin:2px;
            font-size:12px;
            display:inline-block;
        }

        .cart{
            background:orange;
        }

        .wish{
            background:#2874f0;
        }

        .buy{
            background:#fb641b;
        }

    </style>

</head>

<body>

    <h1>{{ category }}</h1>

    <div class="products">

        {% for product in products %}

        <div class="card">

            <img src="{{ product.image }}">

            <h1>{{ product.name }}</h1>

            <h2>₹{{ product.price }}</h2>

            <p>{{ product.category }}</p>

            <div class="buttons">

                <a class="cart" href="/cart/{{ product.id }}">
                    Cart
                </a>

                <a class="wish" href="/wishlist/{{ product.id }}">
                    Wishlist
                </a>

                <a class="buy" href="/buy/{{ product.id }}">
                    Buy
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</body>

</html>
